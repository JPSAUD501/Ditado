name: Release

on:
  push:
    branches:
      - main
      - beta
    paths:
      - package.json

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release_meta.outputs.should_publish }}
      version: ${{ steps.release_meta.outputs.version }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      publish_channel: ${{ steps.release_meta.outputs.publish_channel }}
      release_type: ${{ steps.release_meta.outputs.release_type }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          PREVIOUS_VERSION="$(node -e "const { execSync } = require('node:child_process'); const before = process.argv[1]; if (!before || /^0+$/.test(before)) process.exit(0); try { const json = execSync(\`git show \${before}:package.json\`, { stdio: ['ignore', 'pipe', 'ignore'] }).toString(); process.stdout.write(JSON.parse(json).version ?? ''); } catch {}" "${{ github.event.before }}")"

          SHOULD_PUBLISH="false"
          if [ -z "${PREVIOUS_VERSION}" ] || [ "${PREVIOUS_VERSION}" != "${VERSION}" ]; then
            SHOULD_PUBLISH="true"
          fi

          if [ "${BRANCH}" = "main" ]; then
            if [[ "${VERSION}" == *-* ]]; then
              echo "Main releases must use a stable version without prerelease suffix. Found ${VERSION}."
              exit 1
            fi

            PUBLISH_CHANNEL="latest"
            RELEASE_TYPE="release"
            PRERELEASE="false"
          elif [ "${BRANCH}" = "beta" ]; then
            if [[ "${VERSION}" != *"-beta"* ]]; then
              echo "Beta releases must use a prerelease version containing -beta. Found ${VERSION}."
              exit 1
            fi

            PUBLISH_CHANNEL="beta"
            RELEASE_TYPE="prerelease"
            PRERELEASE="true"
          else
            echo "Unsupported release branch ${BRANCH}."
            exit 1
          fi

          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_channel=${PUBLISH_CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "release_type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  ensure-release-ref:
    runs-on: ubuntu-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.should_publish == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or validate release tag
        shell: bash
        run: |
          TAG="${{ needs.prepare-release.outputs.release_tag }}"
          TARGET_SHA="${GITHUB_SHA}"
          EXISTING_SHA="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{ print $1 }')"

          if [ -n "${EXISTING_SHA}" ]; then
            if [ "${EXISTING_SHA}" != "${TARGET_SHA}" ]; then
              echo "Tag ${TAG} already exists on ${EXISTING_SHA}, expected ${TARGET_SHA}."
              exit 1
            fi

            echo "Tag ${TAG} already exists on the expected commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${TARGET_SHA}"
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub release if needed
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ needs.prepare-release.outputs.release_tag }}"
          RELEASE_NAME="Ditado ${{ needs.prepare-release.outputs.version }}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists."
            exit 0
          fi

          if [ "${{ needs.prepare-release.outputs.prerelease }}" = "true" ]; then
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --prerelease \
              --generate-notes
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --latest \
              --generate-notes
          fi

  publish:
    runs-on: ${{ matrix.os }}
    needs:
      - prepare-release
      - ensure-release-ref
    if: needs.prepare-release.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builder_args: --win nsis
          - os: ubuntu-latest
            builder_args: --linux AppImage deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Publish release artifacts
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run release:github -- \
            ${{ matrix.builder_args }} \
            -c.publish.channel=${{ needs.prepare-release.outputs.publish_channel }} \
            -c.publish.releaseType=${{ needs.prepare-release.outputs.release_type }}
