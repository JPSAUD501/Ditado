name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      publish_channel: ${{ steps.release_meta.outputs.publish_channel }}
      release_type: ${{ steps.release_meta.outputs.release_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate tag and release channel
        id: release_meta
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          EXPECTED_TAG="v${VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}."
            exit 1
          fi

          if [[ "${VERSION}" == *"-beta"* ]]; then
            echo "publish_channel=beta" >> "$GITHUB_OUTPUT"
            echo "release_type=prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "publish_channel=latest" >> "$GITHUB_OUTPUT"
            echo "release_type=release" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builder_args: --win nsis
          - os: ubuntu-latest
            builder_args: --linux AppImage deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Publish release artifacts
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run release:github -- \
            ${{ matrix.builder_args }} \
            -c.publish.channel=${{ needs.prepare-release.outputs.publish_channel }} \
            -c.publish.releaseType=${{ needs.prepare-release.outputs.release_type }}
