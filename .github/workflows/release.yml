name: Release

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_metadata.outputs.version }}
      release_tag: ${{ steps.release_metadata.outputs.release_tag }}
      publish_channel: ${{ steps.release_metadata.outputs.publish_channel }}
      release_type: ${{ steps.release_metadata.outputs.release_type }}
      prerelease: ${{ steps.release_metadata.outputs.prerelease }}
      release_sha: ${{ steps.release_metadata.outputs.release_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Fetch branch and tags
        shell: bash
        run: |
          git fetch origin "${GITHUB_REF_NAME}" --tags

      - name: Resolve release commit
        id: release_metadata
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SOURCE_SHA="${GITHUB_SHA}"
          EXISTING_RELEASE_SHA="$(git log "origin/${BRANCH}" --grep="^Source-Commit: ${SOURCE_SHA}$" --format='%H' -n 1)"

          write_output() {
            local key="$1"
            local expression="$2"
            echo "${key}=$(node -p "${expression}")" >> "$GITHUB_OUTPUT"
          }

          if [ -n "${EXISTING_RELEASE_SHA}" ]; then
            VERSION="$(git show "${EXISTING_RELEASE_SHA}:package.json" | node -p "JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version")"
            node -e 'const [version, branch] = process.argv.slice(1); const prerelease = branch === "beta"; const channel = prerelease ? "beta" : "latest"; const releaseType = prerelease ? "prerelease" : "release"; process.stdout.write(JSON.stringify({ version, releaseTag: `v${version}`, publishChannel: channel, releaseType, prerelease }));' "${VERSION}" "${BRANCH}" > release-metadata.json
            echo "Reusing existing release commit ${EXISTING_RELEASE_SHA} for source ${SOURCE_SHA}."
          else
            node scripts/release-version.mjs --branch "${BRANCH}" --apply > release-metadata.json
            VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('release-metadata.json', 'utf8')).version")"

            if git diff --quiet -- package.json package-lock.json; then
              echo "Computed release version ${VERSION} does not change tracked manifests. Reusing source commit ${SOURCE_SHA}."
              EXISTING_RELEASE_SHA="${SOURCE_SHA}"
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add package.json package-lock.json
              git commit -m "chore(release): ${VERSION}" -m "Source-Commit: ${SOURCE_SHA}"
              git push origin "HEAD:${BRANCH}"
              EXISTING_RELEASE_SHA="$(git rev-parse HEAD)"
            fi
          fi

          write_output "version" "JSON.parse(require('node:fs').readFileSync('release-metadata.json', 'utf8')).version"
          write_output "release_tag" "JSON.parse(require('node:fs').readFileSync('release-metadata.json', 'utf8')).releaseTag"
          write_output "publish_channel" "JSON.parse(require('node:fs').readFileSync('release-metadata.json', 'utf8')).publishChannel"
          write_output "release_type" "JSON.parse(require('node:fs').readFileSync('release-metadata.json', 'utf8')).releaseType"
          write_output "prerelease" "String(JSON.parse(require('node:fs').readFileSync('release-metadata.json', 'utf8')).prerelease)"
          echo "release_sha=${EXISTING_RELEASE_SHA}" >> "$GITHUB_OUTPUT"

  ensure-release-ref:
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Create or validate release tag
        shell: bash
        run: |
          TAG="${{ needs.prepare-release.outputs.release_tag }}"
          TARGET_SHA="${{ needs.prepare-release.outputs.release_sha }}"
          EXISTING_SHA="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{ print $1 }')"

          if [ -n "${EXISTING_SHA}" ]; then
            if [ "${EXISTING_SHA}" != "${TARGET_SHA}" ]; then
              echo "Tag ${TAG} already exists on ${EXISTING_SHA}, expected ${TARGET_SHA}."
              exit 1
            fi

            echo "Tag ${TAG} already exists on the expected commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${TARGET_SHA}"
          git push origin "refs/tags/${TAG}"

  publish:
    runs-on: ${{ matrix.os }}
    needs:
      - prepare-release
      - ensure-release-ref
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builder_args: --win nsis
          - os: ubuntu-latest
            builder_args: --linux AppImage deb

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Publish release artifacts
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          DITADO_BUILD_OTEL_ENABLED: ${{ vars.DITADO_BUILD_OTEL_ENABLED }}
          DITADO_BUILD_OTEL_BASE_URL: ${{ vars.DITADO_BUILD_OTEL_BASE_URL }}
          DITADO_BUILD_OTEL_TRACES_URL: ${{ vars.DITADO_BUILD_OTEL_TRACES_URL }}
          DITADO_BUILD_OTEL_LOGS_URL: ${{ vars.DITADO_BUILD_OTEL_LOGS_URL }}
          DITADO_BUILD_OTEL_METRICS_URL: ${{ vars.DITADO_BUILD_OTEL_METRICS_URL }}
          DITADO_BUILD_OTEL_TIMEOUT_MS: ${{ vars.DITADO_BUILD_OTEL_TIMEOUT_MS }}
          DITADO_BUILD_OTEL_METRIC_EXPORT_INTERVAL_MS: ${{ vars.DITADO_BUILD_OTEL_METRIC_EXPORT_INTERVAL_MS }}
          DITADO_BUILD_OTEL_SERVICE_NAME: ${{ vars.DITADO_BUILD_OTEL_SERVICE_NAME }}
          DITADO_BUILD_OTEL_DEPLOYMENT_ENV: ${{ vars.DITADO_BUILD_OTEL_DEPLOYMENT_ENV }}
          DITADO_BUILD_OTEL_HEADERS_JSON: ${{ secrets.DITADO_BUILD_OTEL_HEADERS_JSON }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run release:github -- \
            ${{ matrix.builder_args }} \
            -c.publish.channel=${{ needs.prepare-release.outputs.publish_channel }} \
            -c.publish.releaseType=draft

  verify-release-assets:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish

    steps:
      - name: Verify published release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          RELEASE_TAG="${{ needs.prepare-release.outputs.release_tag }}"
          RELEASE_JSON="$(gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" --json isPrerelease,assets)"

          echo "${RELEASE_JSON}" | node -e '
            const release = JSON.parse(require("node:fs").readFileSync(0, "utf8"));
            const names = (release.assets ?? []).map((asset) => asset.name);
            const required = [
              "latest.yml",
              "latest-linux.yml",
              "Ditado-Setup-",
              ".AppImage",
              ".deb",
            ];

            const missing = required.filter((pattern) => !names.some((name) => name.includes(pattern)));
            if (missing.length > 0) {
              console.error(`Release is missing required assets: ${missing.join(", ")}`);
              console.error(`Published assets: ${names.join(", ") || "(none)"}`);
              process.exit(1);
            }
          '

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - verify-release-assets

    steps:
      - name: Publish validated draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          RELEASE_TAG="${{ needs.prepare-release.outputs.release_tag }}"
          PRERELEASE="${{ needs.prepare-release.outputs.prerelease }}"
          RELEASE_ID="$(gh api "repos/${GH_REPO}/releases/tags/${RELEASE_TAG}" --jq '.id')"
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "repos/${GH_REPO}/releases/${RELEASE_ID}" \
            -f draft=false \
            -f prerelease="${PRERELEASE}"
